[workspace]
members = [
    "bin",
    "crates/app",
    "crates/graphics",
    "crates/input",
    "crates/math",
    "crates/scene",
    "crates/window",
]

resolver = "3"

[workspace.dependencies]
winit = { version = "0.30.13" }
wgpu = { version = "29.0.3" }
anyhow = { version = "1.0.102" }
pollster = { version = "0.4.0" }
env_logger = { version = "0.11.10" }
log = { version = "0.4.30" }
bytemuck = { version = "1.25.0", features = ["derive"] }
glam = { version = "0.33.0", features = ["bytemuck"] }
